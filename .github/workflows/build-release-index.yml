name: Build Multi Repo Release Index

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p public

      - name: Fetch all repositories
        run: |
          REPOS=(
            "youtube-downloader"
            "movie-downloader"
            "music-downloader"
            "command-manager-docker"
            "sondakika"
          )

          OUTPUT='{"projects":['

          for repo in "${REPOS[@]}"; do
            echo "Processing $repo"

            RELEASES=$(curl -s https://api.github.com/repos/eaeoz/$repo/releases)
            REPOINFO=$(curl -s https://api.github.com/repos/eaeoz/$repo)

            STARS=$(echo "$REPOINFO" | jq '.stargazers_count // 0')
            OWNER_LOGIN=$(echo "$REPOINFO" | jq -r '.owner.login // "eaeoz"')
            OWNER_AVATAR=$(echo "$REPOINFO" | jq -r '.owner.avatar_url // ""')

            PROJECT=$(echo "$RELEASES" | jq -c --arg repo "$repo" --argjson stars "$STARS" --arg owner "$OWNER_LOGIN" --arg avatar "$OWNER_AVATAR" '{
              repo: $repo,
              stars: $stars,
              owner: {
                login: $owner,
                avatar_url: $avatar
              },
              releases: [.[] | {
                tag: .tag_name,
                name: .name,
                published: .published_at,
                assets: [.assets[] | {
                  name: .name,
                  size: .size,
                  downloads: .download_count,
                  browser_download_url: .browser_download_url,
                  created_at: .created_at
                }]
              }]
            }')

            OUTPUT="$OUTPUT$PROJECT,"
          done

          OUTPUT="${OUTPUT%,}]}"
          echo "$OUTPUT" | jq '.' > public/releases.json

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/releases.json

          git diff --cached --quiet || git commit -m "Update multi-repo releases"

          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
